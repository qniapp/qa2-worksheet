name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit

      - name: Lint
        run: npm run lint

      - name: Build PDF and static site
        run: npm run build
        env:
          CHROME: google-chrome

      - name: Test generated output
        run: npm test
